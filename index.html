<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <!--FONT-->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Sunnyside agency landing page</title>

</head>

<body>

  <!-- NAVBAR START -->
  <nav class="navbar">
    <img src="/images/logo.svg" alt="Logo" class="logo">
    <div class="menu-layout menu-mobile">
      <div class="triangle"></div>
      <div class="menu">
        <ul>
          <li><a href="">About</a></li>
          <li><a href="">Services</a></li> 
          <li><a href="">Projects</a></li> 
          <div class="btn">Contact</div>
        </ul>
      </div>
    </div>
    <img src="/images/icon-hamburger.svg" alt="menu" class="hamburger">
  </nav>
  <!-- NAVBAR END -->




  <!--HERO BANNER START-->
  <section class="hero-banner">

    <img src="/images/mobile/image-header.jpg" alt="header-image" class="img-mobile">
    <img src="/images/desktop/image-header.jpg" alt="header-image" class="img-desktop">

      <div class="hero-text">
        <h1>We are creatives</h1>
        <img src="/images/icon-arrow-down.svg" alt="arrow down image">
      </div>

  </section>
  <!--HERO BANNER END-->



  <script>
    const hamburger = document.querySelector('.hamburger');
    const mobileMenu = document.querySelector('.menu-layout');

    hamburger.addEventListener('click', function(){
      hamburger.classList.toggle('hide');
      mobileMenu.classList.toggle('menu-mobile');
    })
  </script>

</body>

</html>
