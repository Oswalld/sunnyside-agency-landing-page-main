<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <!--FONT-->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
  
  <title>Sunnyside agency landing page</title>

</head>

<body>

  <!-- NAVBAR START -->
  <nav class="navbar">
    <img src="/images/logo.svg" alt="Logo" class="logo">
    <div class="menu-layout">
      <div class="triangle"></div>
      <div class="menu">
        <ul>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li> 
          <li><a href="#">Projects</a></li> 
          <div class="btn">Contact</div>
        </ul>
      </div>
    </div>
    <img src="/images/icon-hamburger.svg" alt="menu" class="hamburger">
  </nav>
  <!-- NAVBAR END -->

  <!--HERO BANNER START-->
  <section class="hero-banner">

    <img src="/images/mobile/image-header.jpg" alt="header-image" class="img-mobile">
    <img src="/images/desktop/image-header.jpg" alt="header-image" class="img-desktop">

      <div class="hero-text">
        <h1>We are creatives</h1>
        <img src="/images/icon-arrow-down.svg" alt="arrow down image">
      </div>

  </section>
  <!--HERO BANNER END-->

  <!-- MIDDLE SECTION START -->
  <section class="middle-section">
    <img src="/images/mobile/image-transform.jpg" width="750" alt="transform illustration" class="img-mobile">
    <img src="/images/desktop/image-transform.jpg" width="720" alt="transform illustration" class="img-desktop">
    <div class="text-block">
      <h2 class="title">Transform your brand</h2>
      <div class="description">
        We are a full-service creative agency specializing in helpîng brands grow fast. Engage your clients through compelling visuals that do most of the marketing for you.
      </div>
      <div class="btn-wrapper">
        <a href="">Learn more</a>
        <div class="link-decoration"></div>
      </div>
    </div>
  </section>
  <!-- MIDDLE SECTION END -->
  
  <script>
    const hamburger = document.querySelector('.hamburger');
    const mobileMenu = document.querySelector('.menu-layout');

    hamburger.addEventListener('click', function(){
      hamburger.classList.toggle('hide');
      mobileMenu.classList.toggle('menu-mobile');
    })
  </script>

</body>

</html>
